{% extends "base.html" %}

{% block content %}

<h2>Your Dashboard</h2>

<h3>Welcome, {{ username }}!</h3>

<!-- TODO: Add a button or link to create a new entry -->
<a href="/create"><button>create</button></a>
<br><br>

<!-- TODO: Loop through entries passed from Flask -->
<!-- The variable "entries" will come from your Flask route -->
<!-- Example structure: -->

{% for entry in entries %}
    <div>
        <h3>{{ entry['title'] }}</h3>
        <p>{{ entry['text'] }}</p>

        <!-- TODO: Add Edit link -->
        <a href="/edit"><button style="background-color: lightblue;">edit</button></a>

        <!-- TODO: Add Delete link -->
        <a href="/delete"><button style="background-color: indianred;">delete</button></a>

    </div>
    <hr>
{% endfor %}

<!-- TODO: If no entries exist, display a message like: -->
{% if entries|length == 0 %}
    <div>
        <p>"No entries yet!"</p>
    
    </div>
    <hr>
{% endif %}

<br>

<!-- TODO: Add a logout button -->
<a href="/logout"><button style="background-color: gray;">logout</button></a>

{% endblock %}
